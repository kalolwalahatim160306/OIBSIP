<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Authentication System</title>
    <!-- External stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Container for dynamic alert notifications -->
    <div id="alert-container" class="alert-container">
        <div id="alert-message" class="alert"></div>
    </div>

    <!-- 1. LOGIN CARD VIEW -->
    <div id="login-view" class="card active">
        <h2>LOGIN</h2>

        <form id="login-form">
            <div class="form-group">
                <input type="text" id="login-username" required placeholder="Username" autocomplete="username">
            </div>
            
            <div class="form-group">
                <input type="password" id="login-password" required placeholder="Password" autocomplete="current-password">
                <a href="#" class="forgot-pwd">Forgot Password?</a>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="remember-me">
                <label for="remember-me">Remember Me</label>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        <div class="footer-text">
            Don't have an Account? <a onclick="navigateTo('register')">Register</a>
        </div>
    </div>

    <!-- 2. REGISTER CARD VIEW -->
    <div id="register-view" class="card">
        <h2>REGISTER</h2>

        <form id="register-form">
            <div class="form-group">
                <input type="text" id="register-username" required placeholder="Username" autocomplete="username">
            </div>
            
            <div class="form-group">
                <input type="password" id="register-password" required placeholder="Password" autocomplete="new-password">
            </div>

            <div class="form-group">
                <input type="password" id="register-confirm-password" required placeholder="Confirm Password" autocomplete="new-password">
            </div>

            <button type="submit" class="btn">Register</button>
        </form>

        <div class="footer-text">
            Already have an Account? <a onclick="navigateTo('login')">Login here</a>
        </div>
    </div>

    <!-- 3. PROTECTED DASHBOARD CARD VIEW -->
    <div id="dashboard-view" class="dashboard-fullscreen">
        <div class="dashboard-content">
            <h1 id="welcome-message">Welcome, [username]</h1>
        </div>
        <button id="logout-btn" class="btn btn-logout">Logout</button>
    </div>

    <!-- External JavaScript logic -->
    <script src="script.js"></script>
</body>
</html>
